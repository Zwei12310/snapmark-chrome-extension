<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>SnapMark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .header .version {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }
    .actions {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #667eea;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #5a6fd6;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.14);
    }
    .btn-full {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      width: 100%;
      padding: 14px;
      font-size: 15px;
      border-radius: 10px;
    }
    .btn-full:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    .features {
      padding: 0 20px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .feature-item {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
    }
    .feature-item .icon {
      font-size: 20px;
      margin-bottom: 4px;
      display: block;
    }
    .divider {
      margin: 0 20px;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .history-section {
      padding: 12px 20px 16px;
    }
    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .history-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .history-thumb {
      width: 40px;
      height: 28px;
      object-fit: cover;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
    }
    .history-info {
      flex: 1;
      min-width: 0;
    }
    .history-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-time {
      font-size: 10px;
      color: #666;
    }
    .history-del {
      color: #666;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .history-del:hover {
      color: #ff4757;
      background: rgba(255,71,87,0.1);
    }
    .empty-state {
      text-align: center;
      color: #555;
      padding: 20px;
      font-size: 12px;
    }
    .status-msg {
      text-align: center;
      padding: 6px 20px;
      font-size: 11px;
      color: #4caf50;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SnapMark</h1>
    <div class="version">v1.0 - 截图标注工具</div>
  </div>

  <div class="actions">
    <button class="btn btn-full" id="btnScreenshot">截图当前页面</button>
    <div class="features">
      <div class="feature-item">
        <span class="icon">✏️</span>矩形/箭头/文字
      </div>
      <div class="feature-item">
        <span class="icon">🎨</span>红/黄/蓝/绿标记
      </div>
      <div class="feature-item">
        <span class="icon">💾</span>一键下载 PNG
      </div>
      <div class="feature-item">
        <span class="icon">📋</span>复制到剪贴板
      </div>
    </div>
  </div>

  <hr class="divider">

  <div class="history-section">
    <div class="section-title">历史截图</div>
    <div class="history-list" id="historyList">
      <div class="empty-state">暂无截图记录</div>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
